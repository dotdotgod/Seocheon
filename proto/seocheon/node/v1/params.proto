syntax = "proto3";
package seocheon.node.v1;

import "amino/amino.proto";
import "gogoproto/gogo.proto";

option go_package = "seocheon/x/node/types";

// Params defines the parameters for the x/node module.
message Params {
  option (amino.name) = "seocheon/x/node/Params";
  option (gogoproto.equal) = true;

  // max_registrations_per_block is the maximum number of node registrations per block.
  uint64 max_registrations_per_block = 1;

  // registration_cooldown_blocks is the cooldown period (in blocks) before same operator can re-register.
  uint64 registration_cooldown_blocks = 2;

  // registration_deposit is the optional deposit required for registration (in uppyeo). Initially 0.
  string registration_deposit = 3 [
    (gogoproto.customtype) = "cosmossdk.io/math.Int",
    (gogoproto.nullable) = false
  ];

  // agent_allowed_msg_types is the whitelist of message types that agent_address can execute.
  repeated string agent_allowed_msg_types = 4;

  // agent_address_change_cooldown is the cooldown period (in blocks) between agent address changes.
  uint64 agent_address_change_cooldown = 5;

  // agent_feegrant_allowed_msg_types is the whitelist of message types allowed for feegrant usage.
  // This is a subset of agent_allowed_msg_types, excluding MsgSend to prevent feegrant fund drain.
  repeated string agent_feegrant_allowed_msg_types = 8;

  // max_tags is the maximum number of tags per node.
  uint32 max_tags = 6;

  // max_tag_length is the maximum character length of each tag.
  uint32 max_tag_length = 7;

  // delegation_confirmation_period is the number of epochs between required delegation confirmations.
  // Default: 90 (~3 months). 0 disables active delegation.
  uint64 delegation_confirmation_period = 9;

  // delegation_renewal_window is the number of epochs at the end of a confirmation period
  // during which MsgConfirmDelegation is accepted. Must be less than delegation_confirmation_period.
  // Default: 7 (~7 days).
  uint64 delegation_renewal_window = 10;

  // epoch_length is the number of blocks per epoch. Default: 17280 (~1 day).
  // Governs agent_share scheduling, delegation confirmation epochs, and boost distribution.
  int64 epoch_length = 11;
}
