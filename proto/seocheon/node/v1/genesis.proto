syntax = "proto3";
package seocheon.node.v1;

import "amino/amino.proto";
import "cosmos/base/v1beta1/coin.proto";
import "gogoproto/gogo.proto";
import "seocheon/node/v1/node.proto";
import "seocheon/node/v1/params.proto";

option go_package = "seocheon/x/node/types";

// GenesisState defines the x/node module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];

  // nodes is the list of registered nodes at genesis.
  repeated Node nodes = 2 [(gogoproto.nullable) = false];

  // registration_pool_balance is the initial balance for the Registration Pool.
  repeated cosmos.base.v1beta1.Coin registration_pool_balance = 3 [
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];

  // feegrant_pool_balance is the initial balance for the Feegrant Pool.
  repeated cosmos.base.v1beta1.Coin feegrant_pool_balance = 4 [
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];

  // boost_pool_balance is the initial balance for the Validator Boost Pool.
  repeated cosmos.base.v1beta1.Coin boost_pool_balance = 5 [
    (gogoproto.castrepeated) = "github.com/cosmos/cosmos-sdk/types.Coins",
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];

  // boost_target_epochs is the target number of epochs over which the boost pool is distributed.
  uint64 boost_target_epochs = 6;

  // delegation_confirmations stores all active delegation confirmation records.
  repeated DelegationConfirmation delegation_confirmations = 7 [(gogoproto.nullable) = false];
}

// DelegationConfirmation stores the expiry epoch for a delegator-validator pair.
message DelegationConfirmation {
  // delegator_address is the delegator's account address.
  string delegator_address = 1;
  // validator_address is the validator's operator address.
  string validator_address = 2;
  // expiry_epoch is the epoch at which the delegation expires if not confirmed.
  uint64 expiry_epoch = 3;
}
